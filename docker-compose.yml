version: "3.9"

services:

  # ── FastAPI prediction service ───────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: pjm_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./mlruns:/app/mlruns:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MLflow tracking server ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: pjm_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      mlflow server
        --backend-store-uri file:///mlflow/mlruns
        --default-artifact-root file:///mlflow/mlruns
        --host 0.0.0.0
        --port 5000
    restart: unless-stopped

  # ── Streamlit dashboard ──────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      target: runtime
    container_name: pjm_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./mlruns:/app/mlruns:ro
      - ./src:/app/src:ro
      - ./app:/app/app:ro
    command: ["streamlit", "run", "app/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

networks:
  default:
    name: pjm_network
